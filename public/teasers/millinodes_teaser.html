<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MilliNodes — FB Teaser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060610;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    gap: 20px;
  }
  canvas { display: block; }
  button {
    padding: 12px 24px;
    background: #ff2080;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-family: sans-serif;
  }
  button:hover { background: #ff40a0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button onclick="saveImage()">Save as PNG</button>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// FB recommended: 1200x630 for link preview, 1080x1080 for square post
const W = 1200, H = 630;
canvas.width = W;
canvas.height = H;

function drawSky() {
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.50);
  sky.addColorStop(0, '#04040c');
  sky.addColorStop(0.5, '#0a0620');
  sky.addColorStop(1, '#180a35');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
}

function drawStars() {
  let seed = 42;
  function srand() { seed = (seed * 16807 + 0) % 2147483647; return seed / 2147483647; }
  ctx.save();
  for (let i = 0; i < 80; i++) {
    const x = srand() * W;
    const y = srand() * H * 0.35;
    const size = srand() * 1.1 + 0.3;
    const alpha = srand() * 0.4 + 0.1;
    ctx.fillStyle = `rgba(200, 220, 255, ${alpha})`;
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawSun() {
  const cx = W / 2;
  const cy = H * 0.46;
  const r = 120;

  ctx.save();

  const glow = ctx.createRadialGradient(cx, cy, r * 0.3, cx, cy, r * 3);
  glow.addColorStop(0, 'rgba(255, 60, 100, 0.15)');
  glow.addColorStop(0.2, 'rgba(255, 30, 80, 0.07)');
  glow.addColorStop(0.5, 'rgba(160, 0, 80, 0.03)');
  glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  const sunGrad = ctx.createLinearGradient(cx, cy - r, cx, cy + r);
  sunGrad.addColorStop(0, '#ffe050');
  sunGrad.addColorStop(0.15, '#ffb030');
  sunGrad.addColorStop(0.35, '#ff5040');
  sunGrad.addColorStop(0.55, '#ff2070');
  sunGrad.addColorStop(0.75, '#c01080');
  sunGrad.addColorStop(1, '#500040');

  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.closePath();
  ctx.fillStyle = sunGrad;
  ctx.fill();

  ctx.globalCompositeOperation = 'destination-out';
  for (let i = 0; i < 12; i++) {
    const t = i / 12;
    const ly = cy - r * 0.1 + r * 1.1 * t;
    const gap = 1.5 + t * 6;
    ctx.fillStyle = `rgba(0, 0, 0, ${0.2 + t * 0.8})`;
    ctx.fillRect(cx - r - 5, ly, r * 2 + 10, gap);
  }
  ctx.globalCompositeOperation = 'source-over';

  ctx.restore();
}

function drawGrid() {
  const horizon = H * 0.56;
  const bottom = H + 30;
  const vanishX = W / 2;

  ctx.save();

  const floorGrad = ctx.createLinearGradient(0, horizon, 0, bottom);
  floorGrad.addColorStop(0, 'rgba(6, 2, 18, 0.95)');
  floorGrad.addColorStop(1, 'rgba(3, 1, 10, 1)');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, horizon, W, bottom - horizon);

  // Horizon line
  ctx.strokeStyle = 'rgba(255, 40, 100, 0.7)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, horizon);
  ctx.lineTo(W, horizon);
  ctx.stroke();

  const hBloom = ctx.createLinearGradient(0, horizon - 12, 0, horizon + 12);
  hBloom.addColorStop(0, 'rgba(255, 40, 100, 0)');
  hBloom.addColorStop(0.5, 'rgba(255, 40, 100, 0.2)');
  hBloom.addColorStop(1, 'rgba(255, 40, 100, 0)');
  ctx.fillStyle = hBloom;
  ctx.fillRect(0, horizon - 12, W, 24);

  // Horizontal lines with racing perspective
  for (let i = 0; i < 25; i++) {
    const t = i / 25;
    const y = horizon + (bottom - horizon) * (t * t);
    const alpha = 0.03 + t * 0.35;
    const r = Math.floor(255 * (1 - t) + 0 * t);
    const g = Math.floor(40 * (1 - t) + 220 * t);
    const b = Math.floor(100 * (1 - t) + 255 * t);
    ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.lineWidth = 0.3 + t * 1.2;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Vertical converging
  for (let i = -20; i <= 20; i++) {
    const spread = i * 40;
    const dist = Math.abs(i) / 20;
    const alpha = Math.max(0.02, 0.25 - dist * 0.2);
    const brightness = 1 - dist * 0.5;
    ctx.strokeStyle = `rgba(0, ${Math.floor(220 * brightness)}, ${Math.floor(255 * brightness)}, ${alpha})`;
    ctx.lineWidth = 0.4;
    ctx.beginPath();
    ctx.moveTo(vanishX, horizon);
    ctx.lineTo(vanishX + spread * 3.5, bottom + 40);
    ctx.stroke();
  }

  ctx.restore();
}

function drawText() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const y1 = H * 0.20;
  const y2 = H * 0.42;

  const chromeGrad = ctx.createLinearGradient(0, y1 - 80, 0, y2 + 80);
  chromeGrad.addColorStop(0, '#50e8ff');
  chromeGrad.addColorStop(0.12, '#90f0ff');
  chromeGrad.addColorStop(0.28, '#d0faff');
  chromeGrad.addColorStop(0.42, '#ffffff');
  chromeGrad.addColorStop(0.55, '#ffd8e8');
  chromeGrad.addColorStop(0.68, '#ff60a0');
  chromeGrad.addColorStop(0.82, '#ff2080');
  chromeGrad.addColorStop(1, '#a00060');

  // MILLI
  ctx.font = `900 150px 'Arial Black', 'Impact', sans-serif`;
  ctx.shadowColor = 'rgba(0, 200, 255, 0.8)';
  ctx.shadowBlur = 70;
  ctx.fillStyle = chromeGrad;
  ctx.fillText('MILLI', W/2, y1);
  ctx.shadowColor = 'rgba(255, 0, 100, 0.3)';
  ctx.shadowBlur = 35;
  ctx.fillText('MILLI', W/2, y1);

  // NODES
  ctx.font = `900 170px 'Arial Black', 'Impact', sans-serif`;
  ctx.shadowColor = 'rgba(0, 200, 255, 0.6)';
  ctx.shadowBlur = 60;
  ctx.fillText('NODES', W/2, y2);
  ctx.shadowColor = 'rgba(255, 0, 100, 0.35)';
  ctx.shadowBlur = 40;
  ctx.fillText('NODES', W/2, y2);

  // Edge
  ctx.shadowBlur = 0;
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
  ctx.font = `900 150px 'Arial Black', 'Impact', sans-serif`;
  ctx.strokeText('MILLI', W/2, y1);
  ctx.font = `900 170px 'Arial Black', 'Impact', sans-serif`;
  ctx.strokeText('NODES', W/2, y2);

  // "COMING SOON" tagline
  ctx.shadowColor = 'rgba(0, 200, 255, 0.5)';
  ctx.shadowBlur = 20;
  ctx.font = `300 28px 'Segoe UI', 'Helvetica Neue', sans-serif`;
  ctx.letterSpacing = '8px';
  ctx.fillStyle = 'rgba(0, 220, 255, 0.7)';
  ctx.fillText('C O M I N G   S O O N', W/2, H * 0.88);

  ctx.restore();
}

// Render
drawSky();
drawStars();
drawSun();
drawGrid();
drawText();

// Vignette
const vig = ctx.createRadialGradient(W/2, H*0.35, W*0.2, W/2, H*0.35, W*0.65);
vig.addColorStop(0, 'rgba(0,0,0,0)');
vig.addColorStop(1, 'rgba(0,0,0,0.5)');
ctx.fillStyle = vig;
ctx.fillRect(0, 0, W, H);

function saveImage() {
  const link = document.createElement('a');
  link.download = 'millinodes_teaser.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
